apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: home-assistant
  labels:
    app: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      containers:
      - name: whisper
        image: rhasspy/wyoming-whisper
        args:
        - --model
        - tiny-int8
        - --language
        - en
        ports:
        - containerPort: 10300
          name: wyoming
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: whisper-data
