# Who may sign in. The app re-reads this file on every request, so adding or
# removing an address here takes effect within a kubelet sync (~60s) without a
# pod restart, and removing one invalidates that user's existing session cookie.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wil-allowed-emails
  namespace: wil
data:
  allowed_emails: |
    tpuralew2004@gmail.com
    tapuralewski@gmail.com
