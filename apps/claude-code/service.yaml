apiVersion: v1
kind: Service
metadata:
  name: claude-code
  namespace: claude-code
  annotations:
    metallb.universe.tf/address-pool: homelab-pool
    external-dns.alpha.kubernetes.io/hostname: claude-code.lan.tapslab.com
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: claude-code
