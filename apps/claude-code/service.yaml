apiVersion: v1
kind: Service
metadata:
  name: claude-code
  namespace: claude-code
  annotations:
    metallb.universe.tf/address-pool: homelab-pool
    external-dns.alpha.kubernetes.io/hostname: claude-code.lan.tapslab.com
spec:
  type: LoadBalancer
  ports:
    - port: 22
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    app: claude-code
