apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code
  namespace: claude-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api-adapter
          image: ghcr.io/tpural/claude-code-api-adapter:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-auth
                  key: CLAUDE_CODE_OAUTH_TOKEN
            - name: PORT
              value: "8080"
            - name: SESSIONS_DIR
              value: /tmp/sessions
            - name: HOME
              value: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
