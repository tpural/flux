apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: postgres
data:
  init-databases.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE USER n8n WITH PASSWORD '${N8N_DB_PASSWORD}';
        CREATE DATABASE n8n OWNER n8n;
        GRANT ALL PRIVILEGES ON DATABASE n8n TO n8n;

        CREATE USER chat_memory WITH PASSWORD '${CHAT_MEMORY_DB_PASSWORD}';
        CREATE DATABASE chat_memory OWNER chat_memory;
        GRANT ALL PRIVILEGES ON DATABASE chat_memory TO chat_memory;
    EOSQL
